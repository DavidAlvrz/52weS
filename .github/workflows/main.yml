name: Build (minify/obfuscate) and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Cambia si tu rama principal tiene otro nombre

permissions:
  contents: write  # Permite al bot crear la rama gh-pages y hacer push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Instalar herramientas de build en el runner
      - name: Install build tools
        run: |
          npm install -g html-minifier-terser clean-css-cli javascript-obfuscator

      # 4️⃣ Build: minificar HTML/CSS, ofuscar JS y copiar archivos estáticos
      - name: Build and minify
        run: |
          set -e  # aborta si hay error

          # Crear carpeta dist limpia
          rm -rf dist
          mkdir -p dist

          echo "Copiando archivos estáticos (excepto html/css/js)..."
          rsync -av --exclude='.git/' --exclude='dist/' --exclude='.github/' \
                   --exclude='*.html' --exclude='*.css' --exclude='*.js' ./ dist/

          echo "Minificando HTML..."
          find . -type f -name '*.html' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              "$file" -o "$out"
          done

          echo "Minificando CSS (una línea)..."
          find . -type f -name '*.css' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            cleancss --format breakWith=none -o "$out" "$file"
          done

          echo "Ofuscando JS..."
          javascript-obfuscator . --output dist \
            --compact true \
            --self-defending true \
            --control-flow-flattening true \
            --exclude dist \
            --exclude .github

      # 5️⃣ Debug: verificar contenido de dist
      - name: Debug dist contents
        run: |
          echo "Mostrando contenido de dist/"
          ls -R dist || echo "No se encontró la carpeta dist"

      # 6️⃣ Deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
