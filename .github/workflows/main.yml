name: Build (minify/obfuscate) and Deploy to GitHub Pages (root)

on:
  push:
    branches:
      - main  # o la rama que uses como principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instalamos herramientas solo en el runner
      - name: Install build tools
        run: |
          npm install -g html-minifier-terser clean-css-cli javascript-obfuscator

      - name: Build (minify HTML & CSS, obfuscate JS, copy static)
        run: |
          # Crear carpeta dist
          rm -rf dist
          mkdir -p dist

          # 0. Copiar todos los archivos manteniendo estructura excepto html/css/js
          rsync -av --exclude='.git/' --exclude='dist/' --exclude='.github/' \
                   --exclude='*.html' --exclude='*.css' --exclude='*.js' ./ dist/

          # 1. Minificar HTML en todo el repo manteniendo estructura
          find . -type f -name '*.html' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              "$file" -o "$out"
          done

          # 2. Minificar CSS en todo el repo manteniendo estructura
          find . -type f -name '*.css' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            cleancss -o "$out" "$file"
          done

          # 3. Ofuscar JS en todo el repo manteniendo estructura
          javascript-obfuscator . --output dist \
            --compact true \
            --self-defending true \
            --control-flow-flattening true \
            --exclude dist \
            --exclude .github

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
