name: Build (minify/obfuscate) and Deploy to GitHub Pages (root)

on:
  push:
    branches:
      - main  # o la rama principal que uses

permissions:        # 👈 importante para que el bot pueda hacer push
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instalamos herramientas solo en el runner
      - name: Install build tools
        run: |
          npm install -g html-minifier-terser clean-css-cli javascript-obfuscator

      - name: Build (minify HTML & CSS, obfuscate JS, copy static)
        run: |
          set -e  # 👈 si algo falla, aborta el job

          # Crear carpeta dist
          rm -rf dist
          mkdir -p dist

          echo "Copiando archivos estáticos (excepto html/css/js)..."
          rsync -av --exclude='.git/' --exclude='dist/' --exclude='.github/' \
                   --exclude='*.html' --exclude='*.css' --exclude='*.js' ./ dist/

          echo "Minificando HTML..."
          find . -type f -name '*.html' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              "$file" -o "$out"
          done

          echo "Minificando CSS..."
          find . -type f -name '*.css' ! -path './dist/*' ! -path './.github/*' | while read file; do
            out="dist/${file#./}"
            mkdir -p "$(dirname "$out")"
            cleancss -o "$out" "$file"
          done

          echo "Ofuscando JS..."
          javascript-obfuscator . --output dist \
            --compact true \
            --self-defending true \
            --control-flow-flattening true \
            --exclude dist \
            --exclude .github

      # 👇 Paso para debug
      - name: Debug dist contents
        run: |
          echo "Mostrando contenido de dist/"
          ls -R dist || echo "No se encontró la carpeta dist"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
